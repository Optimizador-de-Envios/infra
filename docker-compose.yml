services:
  postgres-users:
    image: postgres:16-alpine
    container_name: optimizador-postgres-users
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${USER_DB_NAME}
      POSTGRES_USER: ${USER_DB_USERNAME}
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD}
    volumes:
      - postgres-users-data:/var/lib/postgresql/data
    networks:
      - optimizador-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USER_DB_USERNAME} -d ${USER_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres-shipment:
    image: postgres:16-alpine
    container_name: optimizador-postgres-shipment
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${SHIPMENT_DB_NAME}
      POSTGRES_USER: ${SHIPMENT_DB_USERNAME}
      POSTGRES_PASSWORD: ${SHIPMENT_DB_PASSWORD}
    volumes:
      - postgres-shipment-data:/var/lib/postgresql/data
    networks:
      - optimizador-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SHIPMENT_DB_USERNAME} -d ${SHIPMENT_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  user-service:
    image: ${USER_SERVICE_IMAGE}
    platform: linux/amd64
    container_name: optimizador-user-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      DB_URL: jdbc:postgresql://postgres-users:5432/${USER_DB_NAME}
      DB_USERNAME: ${USER_DB_USERNAME}
      DB_PASSWORD: ${USER_DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_SECONDS: ${JWT_EXPIRATION_SECONDS}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173}
    depends_on:
      postgres-users:
        condition: service_healthy
    networks:
      - optimizador-net

  shipment-service:
    image: ${SHIPMENT_SERVICE_IMAGE}
    platform: linux/amd64
    container_name: optimizador-shipment-service
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      ORS_API_KEY: ${ORS_API_KEY}
      DB_URL: jdbc:postgresql://postgres-shipment:5432/${SHIPMENT_DB_NAME}
      DB_USERNAME: ${SHIPMENT_DB_USERNAME}
      DB_PASSWORD: ${SHIPMENT_DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO}
      JPA_SHOW_SQL: ${JPA_SHOW_SQL}
    depends_on:
      postgres-shipment:
        condition: service_healthy
    networks:
      - optimizador-net

  frontend:
    image: ${FRONTEND_IMAGE}
    platform: linux/amd64
    container_name: optimizador-frontend
    restart: unless-stopped
    depends_on:
      - user-service
      - shipment-service
    networks:
      - optimizador-net

  proxy:
    image: nginx:1.27-alpine
    container_name: optimizador-proxy
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - user-service
      - shipment-service
    networks:
      - optimizador-net

networks:
  optimizador-net:
    driver: bridge

volumes:
  postgres-users-data:
  postgres-shipment-data:
