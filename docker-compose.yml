services:

  backend:
    image: ${BACKEND_IMAGE}
    platform: linux/amd64
    container_name: optimizador-backend
    restart: unless-stopped
    # Puerto expuesto para acceso directo a la API (pruebas, curl, etc.)
    ports:
      - "8080:8080"
    environment:
      ORS_API_KEY: ${ORS_API_KEY}
    networks:
      - optimizador-net
    healthcheck:
      # BusyBox wget (Alpine) retorna exit 1 para cualquier error, incluyendo
      # 4xx/5xx. En lugar de confiar en el exit code, chequeamos que la respuesta
      # contenga "HTTP" en stderr, lo que confirma que el servidor está vivo.
      # "Connection refused" nunca contiene "HTTP" → falla correctamente.
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/pedido 2>&1 | grep -q 'HTTP' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: ${FRONTEND_IMAGE}
    platform: linux/amd64
    container_name: optimizador-frontend
    restart: unless-stopped
    # Sin exposición al host: el acceso es exclusivamente a través del proxy.
    depends_on:
      - backend
    networks:
      - optimizador-net

  proxy:
    image: nginx:1.27-alpine
    container_name: optimizador-proxy
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - optimizador-net

networks:
  optimizador-net:
    driver: bridge
