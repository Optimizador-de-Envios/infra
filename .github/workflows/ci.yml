name: CI — Infra Validation

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      smoke_test:
        description: "Ejecutar smoke test completo (levanta el stack real)"
        type: boolean
        default: false

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Valida docker-compose.yml (sintaxis + interpolación de variables)
  # ─────────────────────────────────────────────────────────────────────────────
  validate-compose:
    name: "Validate — docker compose config"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Crea un .env con valores stub para que la interpolación no falle.
      # No se usan imágenes reales aquí, solo se valida la estructura YAML.
      - name: Crear .env de validación
        run: |
          cat <<'EOF' > .env
          FRONTEND_IMAGE=ghcr.io/optimizador-de-envios/optimizador-envios-frontend:sha-000000
          BACKEND_IMAGE=ghcr.io/optimizador-de-envios/optimizador-envios-backend:sha-000000
          ORS_API_KEY=stub
          EOF

      - name: docker compose config
        run: docker compose config --quiet

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Valida la sintaxis de nginx/proxy.conf
  # ─────────────────────────────────────────────────────────────────────────────
  validate-nginx:
    name: "Validate — nginx config"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: nginx -t
        run: |
          docker run --rm \
            -v "$PWD/nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro" \
            nginx:1.27-alpine nginx -t

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3 — Smoke test: levanta el stack real y verifica que responde
  # Solo se ejecuta si:
  #   - Es un push a main, O
  #   - Se disparó manualmente con smoke_test=true
  # Requiere los secrets ORS_API_KEY, GHCR_TOKEN (PAT read:packages)
  # ─────────────────────────────────────────────────────────────────────────────
  smoke-test:
    name: "Smoke Test — stack completo"
    runs-on: ubuntu-latest
    needs: [validate-compose, validate-nginx]
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.smoke_test == true)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Login en GHCR para poder hacer pull de las imágenes (si son privadas)
      - name: Login en GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Crear .env con imágenes reales
        run: |
          cat <<'EOF' > .env
          FRONTEND_IMAGE=${{ vars.FRONTEND_IMAGE }}
          BACKEND_IMAGE=${{ vars.BACKEND_IMAGE }}
          ORS_API_KEY=${{ secrets.ORS_API_KEY }}
          EOF

      - name: docker compose up
        run: docker compose up -d --wait --timeout 90

      - name: Smoke — backend /actuator/health
        run: |
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/actuator/health)
            if [[ "$STATUS" == "200" ]]; then
              echo "Backend healthy (HTTP $STATUS)"
              exit 0
            fi
            echo "Intento $i — backend HTTP $STATUS, reintentando en 5s..."
            sleep 5
          done
          echo "::error::Backend no respondió 200 en el tiempo esperado"
          exit 1

      - name: Smoke — frontend via proxy (HTTP 200)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000)
          if [[ "$STATUS" != "200" ]]; then
            echo "::error::Frontend respondió HTTP $STATUS (esperado 200)"
            exit 1
          fi
          echo "Frontend/proxy healthy (HTTP $STATUS)"

      - name: Logs del stack (en caso de falla)
        if: failure()
        run: docker compose logs --tail=50

      - name: docker compose down
        if: always()
        run: docker compose down
