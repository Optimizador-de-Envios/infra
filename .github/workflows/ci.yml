name: CI — Infra Validation

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      smoke_test:
        description: "Ejecutar smoke test completo (levanta el stack real)"
        type: boolean
        default: false

permissions:
  contents: read
  packages: read

jobs:
  validate-compose:
    name: "Validate — docker compose config"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Crear .env de validación
        run: |
          cat <<'EOF' > .env
          FRONTEND_IMAGE=ghcr.io/optimizador-de-envios/frontend:sha-0000000
          USER_SERVICE_IMAGE=ghcr.io/optimizador-de-envios/user-service:sha-0000000
          SHIPMENT_SERVICE_IMAGE=ghcr.io/optimizador-de-envios/shipment-service:sha-0000000
          JWT_SECRET=stub-shared-secret
          JWT_EXPIRATION_SECONDS=86400
          USER_DB_NAME=user_service
          USER_DB_USERNAME=user_service
          USER_DB_PASSWORD=user_service
          SHIPMENT_DB_NAME=shipment_service
          SHIPMENT_DB_USERNAME=shipment_service
          SHIPMENT_DB_PASSWORD=shipment_service
          JPA_DDL_AUTO=update
          JPA_SHOW_SQL=false
          ORS_API_KEY=stub
          EOF

      - name: docker compose config
        run: docker compose config --quiet

  validate-nginx:
    name: "Validate — nginx config"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: nginx -t
        run: |
          docker run --rm \
            --add-host frontend:127.0.0.1 \
            --add-host user-service:127.0.0.1 \
            --add-host shipment-service:127.0.0.1 \
            -v "$PWD/nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro" \
            nginx:1.27-alpine nginx -t

  smoke-test:
    name: "Smoke Test — stack completo"
    runs-on: ubuntu-latest
    needs: [validate-compose, validate-nginx]
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.smoke_test == true)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login en GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Crear .env con imágenes reales
        run: |
          cat <<'EOF' > .env
          FRONTEND_IMAGE=${{ vars.FRONTEND_IMAGE || 'ghcr.io/optimizador-de-envios/frontend:sha-d7763cd' }}
          USER_SERVICE_IMAGE=${{ vars.USER_SERVICE_IMAGE || 'ghcr.io/optimizador-de-envios/user-service:sha-90a4163' }}
          SHIPMENT_SERVICE_IMAGE=${{ vars.SHIPMENT_SERVICE_IMAGE || 'ghcr.io/optimizador-de-envios/shipment-service:sha-e1ba8e1' }}
          JWT_SECRET=${{ secrets.JWT_SECRET || 'ci-shared-jwt-secret-change-me-please-use-32-chars' }}
          JWT_EXPIRATION_SECONDS=86400
          USER_DB_NAME=user_service
          USER_DB_USERNAME=user_service
          USER_DB_PASSWORD=user_service
          SHIPMENT_DB_NAME=shipment_service
          SHIPMENT_DB_USERNAME=shipment_service
          SHIPMENT_DB_PASSWORD=shipment_service
          JPA_DDL_AUTO=update
          JPA_SHOW_SQL=false
          ORS_API_KEY=${{ secrets.ORS_API_KEY || 'stub' }}
          EOF

      - name: docker compose up
        run: docker compose up -d --wait --timeout 90

      - name: Smoke — frontend via proxy
        run: |
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 || true)
            if [[ "$STATUS" == "200" ]]; then
              echo "Frontend/proxy healthy (HTTP $STATUS)"
              exit 0
            fi
            echo "Intento $i — frontend/proxy HTTP $STATUS, reintentando en 5s..."
            sleep 5
          done
          echo "::error::Frontend/proxy no respondió 200 en el tiempo esperado"
          exit 1

      - name: Smoke — API routes via proxy
        run: |
          check_proxy_route() {
            local name="$1"
            local url="$2"
            local status

            for i in $(seq 1 10); do
              status=$(curl -s -o /dev/null -w "%{http_code}" "$url" || true)
              if [[ "$status" != "000" && "$status" != "502" ]]; then
                echo "$name alcanzable vía proxy (HTTP $status)"
                return 0
              fi
              echo "Intento $i — $name HTTP $status, reintentando en 5s..."
              sleep 5
            done

            echo "::error::$name no llegó a un backend HTTP real (último HTTP $status)"
            return 1
          }

          check_proxy_route "user-service" "http://localhost:3000/api/users/register"
          check_proxy_route "shipment-service" "http://localhost:3000/api/v1/pedido"

      - name: Logs del stack (en caso de falla)
        if: failure()
        run: docker compose logs --tail=80

      - name: docker compose down
        if: always()
        run: docker compose down
